<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download APK</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    .box {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Download Hello APK</h1>
    <button onclick="downloadAPK()">Download</button>
  </div>

  <script>
    function downloadAPK() {
      const link = document.createElement("a");
      link.href = "./hello.apk";
      link.download = "hello.apk";

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>

</body>
</html>
